<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WASM Tone Generator</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      color: white;
    }
    .container {
      text-align: center;
      padding: 2rem;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(4px);
    }
    h1 {
      margin: 0 0 1rem;
      font-size: 2.5rem;
    }
    p {
      margin: 0 0 2rem;
      opacity: 0.9;
    }
    button {
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      background: #00d4ff;
      color: #1e3c72;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 600;
    }
    button:hover {
      background: #00a8cc;
      transform: translateY(-2px);
    }
    button:active {
      transform: translateY(0);
    }
    .status {
      margin-top: 1rem;
      font-size: 0.9rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>WASM Tone Generator</h1>
    <p>Play a 440Hz sine wave tone generated in WebAssembly</p>
    <button id="playTone">Play 440Hz Tone</button>
    <p class="status">Click to play (WASM + Web Audio API)</p>
  </div>
  <script src="app.js" type="module"></script>
</body>
</html>
